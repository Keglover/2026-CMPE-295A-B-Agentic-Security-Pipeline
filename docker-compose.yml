version: "3.9"

# ---------------------------------------------------------------------------
# Network configuration
#
# "pipeline-net" connects the pipeline and Ollama containers.
# When REAL_TOOLS=false (default), no outbound internet is needed.
# When REAL_TOOLS=true, remove "internal: true" or add an egress network
# so fetch_url can reach the allowlisted domains.
# ---------------------------------------------------------------------------

networks:
  pipeline-net:
    driver: bridge
    internal: true   # no outbound internet access — safe for mock tools
  host-net:
    driver: bridge     # non-internal network for host port publishing

services:
  # -------------------------------------------------------------------------
  # Ollama — local LLM inference server (powers the 'summarize' real tool)
  #
  # Models are stored in the ollama_data volume so they persist across
  # container restarts. Pull a model once: docker exec ollama ollama pull mistral
  # -------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - pipeline-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # -------------------------------------------------------------------------
  # Agentic Security Pipeline — the main application
  # -------------------------------------------------------------------------
  pipeline:
    build: .
    container_name: agentic-security-pipeline
    ports:
      - "8000:8000"
    volumes:
      - ./audit_logs:/app/audit_logs
      - ./sandbox/notes:/app/sandbox/notes
      - ./config:/app/config:ro
    environment:
      - AUDIT_LOG_PATH=/app/audit_logs/audit.ndjson
      - REAL_TOOLS=false
      # Ollama connection — used when REAL_TOOLS=true for the summarize tool
      - OLLAMA_HOST=http://ollama:11434
      - LLM_MODEL=mistral
      - SANDBOX_DIR=/app/sandbox/notes
    networks:
      - pipeline-net
      - host-net
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  ollama_data:
